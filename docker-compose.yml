services:

  postgres:
    image: postgres:16
    container_name: medmemory-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_secret
      POSTGRES_DB: medmemory

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medmemory"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: medmemory-qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: medmemory-ollama
    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama
  
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20

  backend:
    build:
      context: .

    container_name: medmemory-backend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy

      qdrant:
        condition: service_started

      ollama:
        condition: service_started
    
    test:
      [
        "CMD-SHELL",
        "curl -f http://localhost:8000/api/health || exit 1"
      ]

volumes:
  postgres_data:
  qdrant_storage:
  ollama_data:
